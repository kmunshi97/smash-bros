# Builds the Flutter web bundle and publishes it to GitHub Pages so the POC is
# shareable as a link (https://kmunshi97.github.io/smash-bros/).
#
# One-time setup in the repo: Settings → Pages → "Build and deployment" →
# Source: "GitHub Actions". After that, every push to main (or a manual run)
# redeploys. Trigger manually from the Actions tab via "Run workflow".
name: deploy-web

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # base-href must match the Pages sub-path for a project site so the app's
      # asset/script URLs resolve under /smash-bros/.
      - run: flutter build web --release --base-href "/smash-bros/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
